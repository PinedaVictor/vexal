version: 2

project_name: vexal

builds:
  - id: darwin
    binary: vx
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'vx/config.ENVIRONMENT={{ .Env.ENVIRONMENT }}'
      - -X 'vx/config.APP_URL={{ .Env.APP_URL }}'
      - -X 'vx/config.SERVER_REDIRECT_ADDR={{ .Env.SERVER_REDIRECT_ADDR }}'
      - -X 'vx/config.GCP_PROJECT_ID={{ .Env.GCP_PROJECT_ID }}'
      - -X 'vx/config.GCP_ACCOUNT_TYPE={{ .Env.GCP_ACCOUNT_TYPE }}'
      - -X 'vx/config.FB_ADMIN_PRIVATE_KEY={{ .Env.FB_ADMIN_PRIVATE_KEY }}'
      - -X 'vx/config.FB_ADMIN_CLIENT_EMAIL={{ .Env.FB_ADMIN_CLIENT_EMAIL }}'
      - -X 'vx/config.SECRETS_MAN_ACCOUNT_TYPE={{ .Env.SECRETS_MAN_ACCOUNT_TYPE }}'
      - -X 'vx/config.SECRETS_MAN_PRIVATE_KEY={{ .Env.SECRETS_MAN_PRIVATE_KEY }}'
      - -X 'vx/config.SECRETS_MAN_EMAIL={{ .Env.SECRETS_MAN_EMAIL }}'
      - -X 'vx/config.JIRA_OAUTH_CLIENT_ID={{ .Env.JIRA_OAUTH_CLIENT_ID }}'
      - -X 'vx/config.JIRA_STATE={{ .Env.JIRA_STATE }}'

  - id: linux
    binary: vx
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X 'vx/config.ENVIRONMENT={{ .Env.ENVIRONMENT }}'
      - -X 'vx/config.APP_URL={{ .Env.APP_URL }}'
      - -X 'vx/config.SERVER_REDIRECT_ADDR={{ .Env.SERVER_REDIRECT_ADDR }}'
      - -X 'vx/config.GCP_PROJECT_ID={{ .Env.GCP_PROJECT_ID }}'
      - -X 'vx/config.GCP_ACCOUNT_TYPE={{ .Env.GCP_ACCOUNT_TYPE }}'
      - -X 'vx/config.FB_ADMIN_PRIVATE_KEY={{ .Env.FB_ADMIN_PRIVATE_KEY }}'
      - -X 'vx/config.FB_ADMIN_CLIENT_EMAIL={{ .Env.FB_ADMIN_CLIENT_EMAIL }}'
      - -X 'vx/config.SECRETS_MAN_ACCOUNT_TYPE={{ .Env.SECRETS_MAN_ACCOUNT_TYPE }}'
      - -X 'vx/config.SECRETS_MAN_PRIVATE_KEY={{ .Env.SECRETS_MAN_PRIVATE_KEY }}'
      - -X 'vx/config.SECRETS_MAN_EMAIL={{ .Env.SECRETS_MAN_EMAIL }}'
      - -X 'vx/config.JIRA_OAUTH_CLIENT_ID={{ .Env.JIRA_OAUTH_CLIENT_ID }}'
      - -X 'vx/config.JIRA_STATE={{ .Env.JIRA_STATE }}'

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: checksums.txt

brews:
  - name: vexal
    repository:
      owner: PinedaVictor
      name: homebrew-vx
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://www.vexal.io/"
    description: "Developer workflow CLI with dependency graph, AI tooling, and repo automation."
    license: BSD-3-Clause
    install: |
      bin.install "vx"
    caveats: |
      _______________________________
      /                               \
      |   ___________________________   |
      |  |                           |  |
      |  |   C:\> vx -v              |  |
      |  |                           |  |
      |  |   VEXAL CLI INSTALLED!    |  |
      |  |                           |  |
      |  |   [ READY TO LAUNCH ]     |  |
      |  |___________________________|  |
      |                                 |
      \_______________________________/
             \_______________/

      Thank you for installing Vexal!

      Contact Information:
      - Docs: https://www.vexal.io/
      - GitHub: https://github.com/PinedaVictor/vexal
      - Email: pinedavictor095@gmail.com
    test: |
      assert_match "vx version", shell_output("#{bin}/vx --version")

release:
  github:
    owner: PinedaVictor
    name: vexal
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
