name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure git for private modules
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: build --id darwin
        env:
          CGO_ENABLED: 1
          GOPRIVATE: github.com/DreamlikeDigital/*,github.com/PinedaVictor/*
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          APP_URL: ${{ secrets.APP_URL }}
          SERVER_REDIRECT_ADDR: ${{ secrets.SERVER_REDIRECT_ADDR }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ACCOUNT_TYPE: ${{ secrets.GCP_ACCOUNT_TYPE }}
          FB_ADMIN_PRIVATE_KEY: ${{ secrets.FB_ADMIN_PRIVATE_KEY }}
          FB_ADMIN_CLIENT_EMAIL: ${{ secrets.FB_ADMIN_CLIENT_EMAIL }}
          SECRETS_MAN_ACCOUNT_TYPE: ${{ secrets.SECRETS_MAN_ACCOUNT_TYPE }}
          SECRETS_MAN_PRIVATE_KEY: ${{ secrets.SECRETS_MAN_PRIVATE_KEY }}
          SECRETS_MAN_EMAIL: ${{ secrets.SECRETS_MAN_EMAIL }}
          JIRA_OAUTH_CLIENT_ID: ${{ secrets.JIRA_OAUTH_CLIENT_ID }}
          JIRA_STATE: ${{ secrets.JIRA_STATE }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: dist/
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure git for private modules
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: build --id linux
        env:
          CGO_ENABLED: 1
          GOPRIVATE: github.com/DreamlikeDigital/*,github.com/PinedaVictor/*
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          APP_URL: ${{ secrets.APP_URL }}
          SERVER_REDIRECT_ADDR: ${{ secrets.SERVER_REDIRECT_ADDR }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ACCOUNT_TYPE: ${{ secrets.GCP_ACCOUNT_TYPE }}
          FB_ADMIN_PRIVATE_KEY: ${{ secrets.FB_ADMIN_PRIVATE_KEY }}
          FB_ADMIN_CLIENT_EMAIL: ${{ secrets.FB_ADMIN_CLIENT_EMAIL }}
          SECRETS_MAN_ACCOUNT_TYPE: ${{ secrets.SECRETS_MAN_ACCOUNT_TYPE }}
          SECRETS_MAN_PRIVATE_KEY: ${{ secrets.SECRETS_MAN_PRIVATE_KEY }}
          SECRETS_MAN_EMAIL: ${{ secrets.SECRETS_MAN_EMAIL }}
          JIRA_OAUTH_CLIENT_ID: ${{ secrets.JIRA_OAUTH_CLIENT_ID }}
          JIRA_STATE: ${{ secrets.JIRA_STATE }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/
          retention-days: 1

  release:
    needs: [build-darwin, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --skip=build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          APP_URL: ${{ secrets.APP_URL }}
          SERVER_REDIRECT_ADDR: ${{ secrets.SERVER_REDIRECT_ADDR }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ACCOUNT_TYPE: ${{ secrets.GCP_ACCOUNT_TYPE }}
          FB_ADMIN_PRIVATE_KEY: ${{ secrets.FB_ADMIN_PRIVATE_KEY }}
          FB_ADMIN_CLIENT_EMAIL: ${{ secrets.FB_ADMIN_CLIENT_EMAIL }}
          SECRETS_MAN_ACCOUNT_TYPE: ${{ secrets.SECRETS_MAN_ACCOUNT_TYPE }}
          SECRETS_MAN_PRIVATE_KEY: ${{ secrets.SECRETS_MAN_PRIVATE_KEY }}
          SECRETS_MAN_EMAIL: ${{ secrets.SECRETS_MAN_EMAIL }}
          JIRA_OAUTH_CLIENT_ID: ${{ secrets.JIRA_OAUTH_CLIENT_ID }}
          JIRA_STATE: ${{ secrets.JIRA_STATE }}
