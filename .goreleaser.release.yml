version: 2

project_name: vexal

builds:
  - id: darwin
    builder: prebuilt
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    prebuilt:
      path: "dist/{{ .Binary }}_{{ .Os }}_{{ .Arch }}{{ if .Amd64 }}_{{ .Amd64 }}{{ end }}/{{ .Binary }}"

  - id: linux
    builder: prebuilt
    goos:
      - linux
    goarch:
      - amd64
    prebuilt:
      path: "dist/{{ .Binary }}_{{ .Os }}_{{ .Arch }}{{ if .Amd64 }}_{{ .Amd64 }}{{ end }}/{{ .Binary }}"

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: checksums.txt

brews:
  - name: vexal
    repository:
      owner: PinedaVictor
      name: homebrew-vx
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://www.vexal.io/"
    description: "Developer workflow CLI with dependency graph, AI tooling, and repo automation."
    license: BSD-3-Clause
    install: |
      bin.install "vx"
    caveats: |
      _______________________________
      /                               \
      |   ___________________________   |
      |  |                           |  |
      |  |   C:\> vx -v              |  |
      |  |                           |  |
      |  |   VEXAL CLI INSTALLED!    |  |
      |  |                           |  |
      |  |   [ READY TO LAUNCH ]     |  |
      |  |___________________________|  |
      |                                 |
      \_______________________________/
             \_______________/

      Thank you for installing Vexal!

      Contact Information:
      - Docs: https://www.vexal.io/
      - GitHub: https://github.com/PinedaVictor/vexal
      - Email: pinedavictor095@gmail.com
    test: |
      assert_match "vx version", shell_output("#{bin}/vx --version")

release:
  github:
    owner: PinedaVictor
    name: vexal
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
